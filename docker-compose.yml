version: "3.9"

services:
  frontend:
    image: node:20
    working_dir: /workspace
    command: sh -c "npm install && npm run dev"
    ports:
      - "9002:9002"
    volumes:
      - ./:/workspace
    environment:
      - NEXT_PUBLIC_ML_API_URL=http://localhost:8000
    depends_on:
      - backend

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    env_file:
      - ./backend/.env.example
    depends_on:
      - postgres
      - neo4j

  postgres:
    image: postgres:16
    restart: unless-stopped
    environment:
      POSTGRES_DB: openmind
      POSTGRES_USER: openmind
      POSTGRES_PASSWORD: openmind
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  neo4j:
    image: neo4j:5
    restart: unless-stopped
    environment:
      NEO4J_AUTH: neo4j/openmindneo4j
    ports:
      - "7474:7474"
      - "7687:7687"
    volumes:
      - neo4jdata:/data

volumes:
  pgdata:
  neo4jdata:
