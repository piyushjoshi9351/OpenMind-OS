name: OpenMind CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npm run lint
      - run: npm run typecheck

  frontend-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npm run build

  e2e-smoke:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npx playwright install --with-deps chromium
      - run: npm run test:e2e

  backend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    env:
      PYTHONPATH: ${{ github.workspace }}/backend
      PIP_DISABLE_PIP_VERSION_CHECK: "1"
      PIP_DEFAULT_TIMEOUT: "120"
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: backend/requirements.txt
      - name: Install backend dependencies (retry on transient network/SSL)
        shell: bash
        run: |
          python -m pip install --upgrade pip
          for attempt in 1 2 3; do
            echo "Install attempt ${attempt}/3"
            if python -m pip install --no-cache-dir --retries 10 --timeout 120 -r requirements.txt; then
              exit 0
            fi
            if [ "$attempt" -lt 3 ]; then
              echo "Install failed, retrying in 10s..."
              sleep 10
            fi
          done
          echo "Dependency installation failed after 3 attempts"
          exit 1
      - run: python -m compileall app
      - run: pytest
      - run: python scripts/train_goal_model.py --dataset data/training/sample_goal_training_data.csv --report-out data/training/goal_model_validation_report.json
      - run: python scripts/predeploy_check.py
      - run: test -f app/data/goal_prediction_model.json
      - run: test -f data/training/goal_model_validation_report.json
      - uses: actions/upload-artifact@v4
        with:
          name: backend-ml-artifacts
          path: |
            backend/app/data/goal_prediction_model.json
            backend/data/training/goal_model_validation_report.json

  backend-container-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Build backend image
        run: docker build -t openmind-backend-ci ./backend
